<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
</head>
<body>

    <h3>Create an account</h3>

    <form action="URL" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter your age"><br><br>

        <fieldset>
            <legend>Gender:</legend>

            <label for="Male">Male</label>
            <input type="radio" id="Male" value="Male" name="Gender">
            <br>
            <label for="female">Female:</label>
            <input type="radio" id="Female" value="Female" name="Gender">
        </fieldset><br>

        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="USA">USA</option>
            <option value="Brazil">Brazil</option>
            <option value="Spain">Spain</option>
            <option value="China">China</option>
            <option value="Italy">Italy</option>
         </select><br><br>

         <h4>Interests:</h4>
         <label for="Football">Football</label>
         <input type="checkbox" id="Football" name="Interests" value="Football"><br>
         <label for="Rugby">Rugby</label>
         <input type="checkbox" id="Rugby" name="Interests" value="Rugby"><br>
         <label for="Chess">Chess</label>
         <input type="checkbox" id="Chess" name="Interests" value="Chess"><br>

         <label for="About">About Yourself:</label>
         <textarea id="About" rows="3" cols="30"></textarea><br><br>

         <input type="reset" id="reset" style="color: purple;"><br><br>
         <input type="submit" id="submit" style="color: green;">
        
        
        
        </form>
    
</body>
</html>
